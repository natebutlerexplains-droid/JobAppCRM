<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1e293b" rx="8"/>

  <!-- Defs for gradients -->
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Conveyor belt line -->
  <line x1="4" y1="32" x2="56" y2="32" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Processing stations (boxes on the line) -->
  <rect x="8" y="24" width="8" height="16" fill="#3b82f6" rx="1" opacity="0.8"/>
  <rect x="24" y="24" width="8" height="16" fill="#06b6d4" rx="1" opacity="0.8"/>
  <rect x="40" y="24" width="8" height="16" fill="#3b82f6" rx="1" opacity="0.8"/>

  <!-- Connection lines between stations -->
  <line x1="16" y1="32" x2="24" y2="32" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="32" y1="32" x2="40" y2="32" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>

  <!-- Arrow head at the end -->
  <polygon points="58,32 52,28 52,36" fill="#06b6d4"/>
</svg>